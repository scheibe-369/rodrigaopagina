<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tráfego Studio - Central de Produção</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" xintegrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        /* SCROLLBAR CUSTOMIZADA */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .drag-over { border: 2px dashed #8b5cf6 !important; opacity: 0.5; }

        /* REGRAS PARA O PDF PERFEITO */
        .print-only { display: none; }
        .pdf-active { 
            display: block !important; 
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            background: #ffffff; 
            z-index: 9999; 
            padding: 40px; 
            color: #111827;
        }
    </style>
</head>
<body class="bg-[#070b14]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- PALETAS DE CORES PARA NOVOS CLIENTES ---
        const PRESET_COLORS = [
            { theme: 'from-amber-500 to-orange-600', text: 'text-amber-400', bg: 'bg-amber-500/10', border: 'border-amber-500/30' },
            { theme: 'from-emerald-500 to-teal-600', text: 'text-emerald-400', bg: 'bg-emerald-500/10', border: 'border-emerald-500/30' },
            { theme: 'from-violet-500 to-indigo-600', text: 'text-violet-400', bg: 'bg-violet-500/10', border: 'border-violet-500/30' },
            { theme: 'from-rose-500 to-red-600', text: 'text-rose-400', bg: 'bg-rose-500/10', border: 'border-rose-500/30' },
            { theme: 'from-cyan-500 to-blue-600', text: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' }
        ];

        // --- DADOS INICIAIS MOCKADOS ---
        const INITIAL_CLIENTS = [
          { id: 'moteis', name: 'Motéis', theme: 'from-rose-500 to-pink-600', text: 'text-pink-400', bg: 'bg-pink-500/10', border: 'border-pink-500/30' },
          { id: 'cubo', name: 'Cubo Self', theme: 'from-cyan-500 to-blue-600', text: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' },
          { id: 'viv', name: 'ViV', theme: 'from-purple-500 to-fuchsia-600', text: 'text-fuchsia-400', bg: 'bg-fuchsia-500/10', border: 'border-fuchsia-500/30' }
        ];

        const TAREFAS_MOCK = [];
        const CRIATIVOS_MOCK = [];
        const ANUNCIOS_MOCK = [];

        // --- MIGRACAO DE SCHEMA (limpa dados em formato antigo) ---
        // A versao antiga salvava task.clientId (string). A nova usa task.client (objeto).
        // Se detectar o formato antigo, limpa todas as chaves ts3_ pra evitar crash no render.
        (function migrateSchema() {
            try {
                const keys = ['tasks', 'criativos'];
                let needsWipe = false;
                for (const k of keys) {
                    const raw = window.localStorage.getItem('ts3_' + k);
                    if (!raw) continue;
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        const first = parsed[0];
                        // Formato antigo: tem clientId (string) e NAO tem client (objeto com .name)
                        if (first && first.clientId !== undefined && (!first.client || typeof first.client !== 'object')) {
                            needsWipe = true;
                            break;
                        }
                    }
                }
                if (needsWipe) {
                    ['clientes', 'tasks', 'anuncios', 'criativos', 'comentarios', 'nomeUsuario'].forEach(k => {
                        window.localStorage.removeItem('ts3_' + k);
                    });
                    console.info('[ts3] Dados em formato antigo detectados e limpos. Recarregando estado fresh.');
                }
            } catch (e) { console.warn('[ts3] Migration check failed:', e); }
        })();

        // Auxiliares LocalStorage
        const loadLocal = (key, fallback) => {
            try { const item = window.localStorage.getItem('ts3_' + key); return item ? JSON.parse(item) : fallback; }
            catch (e) { return fallback; }
        };
        const saveLocal = (key, data) => { window.localStorage.setItem('ts3_' + key, JSON.stringify(data)); };

        function App() {
          const [now, setNow] = useState(Date.now());
          useEffect(() => {
              const interval = setInterval(() => setNow(Date.now()), 1000);
              return () => clearInterval(interval);
          }, []);

          // --- ESTADOS DO SISTEMA ---
          const [clientes, setClientes] = useState(() => loadLocal('clientes', INITIAL_CLIENTS));
          const [globalClientFilter, setGlobalClientFilter] = useState('ALL');
          const [activeAdTab, setActiveAdTab] = useState(clientes[0]?.id || 'moteis');

          const [tasks, setTasks] = useState(() => loadLocal('tasks', TAREFAS_MOCK));
          const [anuncios, setAnuncios] = useState(() => loadLocal('anuncios', ANUNCIOS_MOCK));
          const [criativos, setCriativos] = useState(() => loadLocal('criativos', CRIATIVOS_MOCK));

          // --- SYNC COM SERVIDOR (KV via /api/state) ---
          // Estado compartilhado entre todos que abrem o link.
          const [serverLoaded, setServerLoaded] = useState(false);
          const [syncStatus, setSyncStatus] = useState('loading'); // 'loading' | 'synced' | 'saving' | 'error'
          const saveTimerRef = useRef(null);

          // On mount: buscar estado do servidor e sobrescrever estado local
          useEffect(() => {
              fetch('/api/state', { cache: 'no-store' })
                  .then(r => r.ok ? r.json() : Promise.reject(r.status))
                  .then(data => {
                      if (data && typeof data === 'object') {
                          if (Array.isArray(data.clientes) && data.clientes.length > 0) {
                              setClientes(data.clientes); saveLocal('clientes', data.clientes);
                          }
                          if (Array.isArray(data.tasks)) {
                              setTasks(data.tasks); saveLocal('tasks', data.tasks);
                          }
                          if (Array.isArray(data.anuncios)) {
                              setAnuncios(data.anuncios); saveLocal('anuncios', data.anuncios);
                          }
                          if (Array.isArray(data.criativos)) {
                              setCriativos(data.criativos); saveLocal('criativos', data.criativos);
                          }
                      }
                      setSyncStatus('synced');
                  })
                  .catch(err => {
                      console.warn('[ts3] Falha ao carregar estado do servidor (usando localStorage):', err);
                      setSyncStatus('error');
                  })
                  .finally(() => setServerLoaded(true));
          }, []);

          // Debounced save pro servidor: a cada alteracao, agenda PUT em 1.5s
          useEffect(() => {
              if (!serverLoaded) return; // nao sobrescreve servidor antes do primeiro load
              if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
              setSyncStatus('saving');
              saveTimerRef.current = setTimeout(() => {
                  const state = { clientes, tasks, anuncios, criativos };
                  fetch('/api/state', {
                      method: 'PUT',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(state),
                  })
                  .then(r => { if (!r.ok) throw new Error('status ' + r.status); return r.json(); })
                  .then(() => setSyncStatus('synced'))
                  .catch(err => {
                      console.warn('[ts3] Falha ao salvar no servidor:', err);
                      setSyncStatus('error');
                  });
              }, 1500);
              return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
          }, [clientes, tasks, anuncios, criativos, serverLoaded]);

          // Estados de Modais
          const [isAdModalOpen, setIsAdModalOpen] = useState(false);
          const [isCreativeModalOpen, setIsCreativeModalOpen] = useState(false);
          const [isEditTaskModalOpen, setIsEditTaskModalOpen] = useState(false);
          const [isEditCreativeModalOpen, setIsEditCreativeModalOpen] = useState(false);
          const [isCommentsModalOpen, setIsCommentsModalOpen] = useState(false);
          const [isNewTaskModalOpen, setIsNewTaskModalOpen] = useState(false);
          const [isNewClientModalOpen, setIsNewClientModalOpen] = useState(false);
          const [imagePreviewUrl, setImagePreviewUrl] = useState(null); 
          const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
          
          const [editingTask, setEditingTask] = useState(null);
          const [editingCreative, setEditingCreative] = useState(null);
          const [activeTaskForComments, setActiveTaskForComments] = useState(null);

          const [newTaskDetails, setNewTaskDetails] = useState({ title: '', client: clientes[0]?.id || '', platform: 'Meta Ads', deadline: '', isUrgent: false, attachment: '', assignee: '' });
          const [newAd, setNewAd] = useState({ title: '', copy: '', client: clientes[0]?.id || '', platform: 'Meta Ads', imageUrl: '' });
          const [newCreative, setNewCreative] = useState({ title: '', content: '', client: clientes[0]?.id || '', attachment: '', requestedBy: 'Juan' });
          const [newClientName, setNewClientName] = useState('');
          const [commentInput, setCommentInput] = useState('');
          
          const [draggedTaskId, setDraggedTaskId] = useState(null);
          const [reportPeriod, setReportPeriod] = useState('todos');

          // --- SALVAMENTO LOCAL ---
          const syncData = (colName, itemToSync, fullArrayOverride = null) => {
              if (fullArrayOverride) {
                  if(colName === 'tasks') { setTasks(fullArrayOverride); saveLocal('tasks', fullArrayOverride); }
                  if(colName === 'clientes') { setClientes(fullArrayOverride); saveLocal('clientes', fullArrayOverride); }
                  return;
              }
              let newState = [];
              if(colName === 'tasks') { setTasks(curr => { const i = curr.findIndex(x=>String(x.id)===String(itemToSync.id)); newState = i>-1 ? Object.assign([], curr, {[i]: itemToSync}) : [itemToSync, ...curr]; saveLocal('tasks', newState); return newState; }); }
              if(colName === 'anuncios') { setAnuncios(curr => { const i = curr.findIndex(x=>String(x.id)===String(itemToSync.id)); newState = i>-1 ? Object.assign([], curr, {[i]: itemToSync}) : [itemToSync, ...curr]; saveLocal('anuncios', newState); return newState; }); }
              if(colName === 'criativos') { setCriativos(curr => { const i = curr.findIndex(x=>String(x.id)===String(itemToSync.id)); newState = i>-1 ? Object.assign([], curr, {[i]: itemToSync}) : [itemToSync, ...curr]; saveLocal('criativos', newState); return newState; }); }
          };

          const deleteData = (colName, itemId) => {
              if(colName === 'anuncios') setAnuncios(curr => { const s = curr.filter(c => String(c.id) !== String(itemId)); saveLocal('anuncios', s); return s; });
              if(colName === 'criativos') setCriativos(curr => { const s = curr.filter(c => String(c.id) !== String(itemId)); saveLocal('criativos', s); return s; });
              if(colName === 'tasks') setTasks(curr => { const s = curr.filter(c => String(c.id) !== String(itemId)); saveLocal('tasks', s); return s; });
          };

          // --- NOVO CLIENTE ---
          const handleAddClient = (e) => {
              e.preventDefault();
              if(!newClientName.trim()) return;
              const newId = newClientName.toLowerCase().replace(/\s+/g, '');
              const colorObj = PRESET_COLORS[clientes.length % PRESET_COLORS.length];
              const newClient = { id: newId, name: newClientName, ...colorObj };
              const updatedClients = [...clientes, newClient];
              syncData('clientes', null, updatedClients);
              setIsNewClientModalOpen(false);
              setNewClientName('');
          };

          // --- FILTROS GLOBAIS ABSOLUTOS ---
          const filteredTasks = globalClientFilter === 'ALL' ? tasks : tasks.filter(t => t.client.id === globalClientFilter);
          const filteredCriativos = globalClientFilter === 'ALL' ? criativos : criativos.filter(c => c.client.id === globalClientFilter);
          const filteredAnuncios = globalClientFilter === 'ALL' ? anuncios : anuncios.filter(ad => ad.client === globalClientFilter);

          const doingTasks = filteredTasks.filter(t => t.status === 'doing');
          const queueTasks = filteredTasks.filter(t => t.status !== 'doing' && t.status !== 'inbox' && t.status !== 'done');
          const inboxTasks = filteredTasks.filter(t => t.status === 'inbox');
          const doneTasks = filteredTasks.filter(t => t.status === 'done'); 
          
          const criativosPendentes = filteredCriativos.filter(c => c.status === 'pendente');
          const criativosFazendo = filteredCriativos.filter(c => c.status === 'fazendo' || c.status === 'pausado');
          const criativosDone = filteredCriativos.filter(c => c.status === 'done'); 

          // --- AUXILIARES DE TEMPO ---
          const formatDate = (isoStr) => {
              if(!isoStr) return '---';
              const d = new Date(isoStr);
              return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
          };
          
          const getTempoDecorrido = (inicioStr, fimStr = null) => {
              if (!inicioStr) return '---';
              const inicio = new Date(inicioStr).getTime();
              const fim = fimStr ? new Date(fimStr).getTime() : new Date().getTime();
              const diffMs = Math.max(0, fim - inicio);
              
              const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
              const diffHrs = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
              const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
              
              if(diffDays > 0) return `${diffDays}d ${diffHrs}h`;
              if(diffHrs > 0) return `${diffHrs}h ${diffMins}m`;
              return `${diffMins} minutos`;
          };

          const getTempoRealTime = (inicioStr, fimStr = null) => {
            if (!inicioStr) return '---';
            const inicio = new Date(inicioStr).getTime();
            const fim = fimStr ? new Date(fimStr).getTime() : now; 
            const diff = Math.max(0, fim - inicio);
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            if (d > 0) return `${d}d ${h}h ${m}m ${s}s`;
            if (h > 0) return `${h}h ${m}m ${s}s`;
            return `${m}m ${s}s`;
          };

          // --- UPLOAD DE ANEXOS/IMAGENS ---
          const handleFileUpload = (e, setter, stateObj, fieldName = 'attachment') => {
              const file = e.target.files[0];
              if (file) {
                  const reader = new FileReader();
                  reader.onloadend = () => { setter({...stateObj, [fieldName]: reader.result}); };
                  reader.readAsDataURL(file);
              }
          };

          // --- DRAG AND DROP ---
          const handleDragStart = (e, id) => { setDraggedTaskId(id); e.dataTransfer.effectAllowed = 'move'; };
          const handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
          const handleDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };
          const handleDrop = (e, targetId) => {
              e.preventDefault(); e.currentTarget.classList.remove('drag-over');
              if(draggedTaskId === targetId) return;
              const newTasks = [...tasks];
              const draggedIndex = newTasks.findIndex(t => t.id === draggedTaskId);
              const targetIndex = newTasks.findIndex(t => t.id === targetId);
              if(draggedIndex < 0 || targetIndex < 0) return;
              const [draggedItem] = newTasks.splice(draggedIndex, 1);
              newTasks.splice(targetIndex, 0, draggedItem);
              syncData('tasks', null, newTasks);
              setDraggedTaskId(null);
          };

          // --- TAREFAS (ESTEIRA) ---
          const handleAddNewTask = (e) => {
            e.preventDefault();
            const clienteObj = clientes.find(c => c.id === newTaskDetails.client) || clientes[0];
            syncData('tasks', { 
                id: Date.now().toString(), 
                title: newTaskDetails.title, 
                client: clienteObj, 
                deadline: newTaskDetails.deadline || 'A definir', 
                status: 'inbox', 
                platform: newTaskDetails.platform, 
                isUrgent: newTaskDetails.isUrgent,
                attachment: newTaskDetails.attachment,
                assignee: newTaskDetails.assignee,
                progress: 0,
                startDate: new Date().toISOString()
            });
            setIsNewTaskModalOpen(false);
            setNewTaskDetails({ title: '', client: clientes[0]?.id || '', platform: 'Meta Ads', deadline: '', isUrgent: false, attachment: '', assignee: '' });
          };

          const moverParaFazendo = (taskId) => {
              const task = tasks.find(t => t.id === taskId);
              if(task) syncData('tasks', { ...task, status: 'doing', startDate: task.startDate || new Date().toISOString() });
          };
          const moverParaFinalizado = (taskId) => {
            const task = tasks.find(t => String(t.id) === String(taskId)) || editingTask;
            if(task) syncData('tasks', { ...task, status: 'done', progress: 100, finishedAt: new Date().toISOString() });
            if(isEditTaskModalOpen) setIsEditTaskModalOpen(false);
          };
          
          const openComments = (task) => { setActiveTaskForComments(task); setIsCommentsModalOpen(true); };
          const sendComment = (e) => {
              e.preventDefault();
              if(!commentInput.trim() || !activeTaskForComments) return;
              const newComments = [...(activeTaskForComments.comments || []), { text: commentInput, date: new Date().toISOString() }];
              const updatedTask = { ...activeTaskForComments, comments: newComments };
              syncData('tasks', updatedTask);
              setActiveTaskForComments(updatedTask);
              setCommentInput('');
          };

          // --- CRIATIVOS ---
          const handleAddCreative = (e) => {
            e.preventDefault();
            const clienteObj = clientes.find(c => c.id === newCreative.client) || clientes[0];
            syncData('criativos', { ...newCreative, id: 'c'+Date.now(), client: clienteObj, status: 'pendente', requestedAt: new Date().toISOString() });
            setIsCreativeModalOpen(false);
            setNewCreative({ title: '', content: '', client: clientes[0]?.id || '', attachment: '', requestedBy: 'Juan' });
          };
          const alterarStatusCriativo = (id, novoStatus) => {
              const c = criativos.find(x => x.id === id);
              let atualizacao = { status: novoStatus };
              if(novoStatus === 'fazendo' && !c.startedAt) atualizacao.startedAt = new Date().toISOString();
              if(novoStatus === 'done') atualizacao.finishedAt = new Date().toISOString();
              syncData('criativos', {...c, ...atualizacao});
          };

          const salvarEdicaoCriativo = (e) => {
              e.preventDefault();
              syncData('criativos', editingCreative);
              setIsEditCreativeModalOpen(false);
          };

          // --- ANÚNCIOS ---
          const handleAddAd = (e) => {
            e.preventDefault();
            const clienteObj = clientes.find(c => c.id === newAd.client) || clientes[0];
            syncData('anuncios', { ...newAd, id: Date.now().toString(), client: clienteObj.id });
            setIsAdModalOpen(false);
            setNewAd({ title: '', copy: '', client: clientes[0]?.id || '', platform: 'Meta Ads', imageUrl: '' });
          };

          // --- GERAR PDF PODEROSO (HTML2PDF) ---
          const gerarPDF = (periodo) => {
              if (typeof html2pdf === 'undefined') {
                  alert("Biblioteca de PDF carregando... Tente novamente em 2 segundos.");
                  return;
              }
              
              setReportPeriod(periodo);
              setIsGeneratingPDF(true);
              
              setTimeout(() => { 
                  const element = document.getElementById('relatorio-section');
                  element.classList.remove('print-only');
                  element.classList.add('pdf-active');
                  
                  const opt = {
                      margin:       10,
                      filename:     `Relatorio_Trafego_${periodo.toUpperCase()}.pdf`,
                      image:        { type: 'jpeg', quality: 0.98 },
                      html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                      jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                  };

                  html2pdf().set(opt).from(element).save().then(() => {
                      element.classList.remove('pdf-active');
                      element.classList.add('print-only');
                      setIsGeneratingPDF(false);
                  });
              }, 800); 
          };

          const isWithinPeriod = (finishedAtDateStr) => {
              if (reportPeriod === 'todos') return true;
              if (!finishedAtDateStr) return false;
              const dt = new Date(finishedAtDateStr).getTime();
              const diffMs = Math.abs(now - dt);
              const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
              if (reportPeriod === 'semanal') return diffDays <= 7;
              if (reportPeriod === 'mensal') return diffDays <= 30;
              return true;
          };

          const filteredDoneTasksReport = doneTasks.filter(t => isWithinPeriod(t.finishedAt)).sort((a,b) => new Date(b.finishedAt) - new Date(a.finishedAt));
          const filteredCriativosDoneReport = criativosDone.filter(c => isWithinPeriod(c.finishedAt)).sort((a,b) => new Date(b.finishedAt) - new Date(a.finishedAt));

          return (
            <div className="min-h-screen bg-[#070b14] font-sans text-gray-200 overflow-x-hidden selection:bg-fuchsia-500/30 pb-20">
              
              {/* Background Glow */}
              <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none no-print">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-purple-900/10 blur-[120px]"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/10 blur-[120px]"></div>
              </div>

              <main className="max-w-7xl mx-auto p-6 lg:p-10 space-y-12 no-print">
                
                <header className="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-white/5 pb-8">
                  <div>
                    <div className="flex items-center gap-2 mb-2">
                      <i className="fa-solid fa-wand-magic-sparkles text-fuchsia-400"></i>
                      <span className="text-sm font-semibold tracking-wider text-fuchsia-400 uppercase">Tráfego Studio</span>
                      {syncStatus === 'loading' && (
                          <span className="ml-2 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-blue-500/10 text-blue-400 border border-blue-500/30 flex items-center gap-1.5"><i className="fa-solid fa-circle-notch fa-spin"></i> Carregando</span>
                      )}
                      {syncStatus === 'saving' && (
                          <span className="ml-2 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-yellow-500/10 text-yellow-400 border border-yellow-500/30 flex items-center gap-1.5"><i className="fa-solid fa-cloud-arrow-up"></i> Salvando</span>
                      )}
                      {syncStatus === 'synced' && (
                          <span className="ml-2 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 flex items-center gap-1.5"><i className="fa-solid fa-cloud-arrow-up"></i> Sincronizado</span>
                      )}
                      {syncStatus === 'error' && (
                          <span className="ml-2 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md bg-red-500/10 text-red-400 border border-red-500/30 flex items-center gap-1.5" title="Falha na comunicação com o servidor"><i className="fa-solid fa-triangle-exclamation"></i> Offline</span>
                      )}
                    </div>
                    <h1 className="text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500 tracking-tight">
                      Central de Produção

                </div>
              )}

              {/* MODAL: EDITAR TAREFA */}
              {isEditTaskModalOpen && editingTask && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print overflow-y-auto">
                  <div className="bg-[#0f1523] border border-blue-500/30 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative my-auto">
                    <button onClick={() => setIsEditTaskModalOpen(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-pen text-blue-500"></i> Editar Demanda</h2>
                    <form onSubmit={(e) => { e.preventDefault(); syncData('tasks', editingTask); setIsEditTaskModalOpen(false); }} className="space-y-4">
                      <div className="bg-red-900/20 border border-red-500/30 p-4 rounded-xl flex items-center gap-3 mb-2">
                          <input type="checkbox" id="urgentCheck" className="w-5 h-5 accent-red-600 cursor-pointer" checked={editingTask.isUrgent || false} onChange={e => setEditingTask({...editingTask, isUrgent: e.target.checked})} />
                          <label htmlFor="urgentCheck" className="text-red-400 font-bold uppercase tracking-wider text-sm cursor-pointer flex-1 flex items-center gap-2"><i className="fa-solid fa-bolt"></i> Prioridade Máxima</label>
                      </div>
                      
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Título</label>
                        <input required type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={editingTask.title} onChange={e => setEditingTask({...editingTask, title: e.target.value})} />
                      </div>

                      {/* NOVO CAMPO: RESPONSÁVEL NO EDIT */}
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Responsável (Atendente)</label>
                        <input type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-indigo-500/50 outline-none" value={editingTask.assignee || ''} onChange={e => setEditingTask({...editingTask, assignee: e.target.value})} placeholder="Ex: Ana, Carlos..." />
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                          <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Data Início</label><input type="date" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={editingTask.startDate ? editingTask.startDate.split('T')[0] : ''} onChange={e => setEditingTask({...editingTask, startDate: e.target.value ? new Date(e.target.value).toISOString() : ''})} /></div>
                          <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Prazo</label><input type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={editingTask.deadline} onChange={e => setEditingTask({...editingTask, deadline: e.target.value})} /></div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                          <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Progresso (%)</label><input type="number" min="0" max="100" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={editingTask.progress || 0} onChange={e => setEditingTask({...editingTask, progress: parseInt(e.target.value)})} /></div>
                          <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Status / Coluna</label>
                            <select className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={editingTask.status} onChange={e => setEditingTask({...editingTask, status: e.target.value})}>
                              <option value="inbox">Inbox</option><option value="todo">Fila (A Fazer)</option><option value="doing">Em Foco</option><option value="review">Em Aprovação</option>
                            </select>
                          </div>
                      </div>
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl mt-4">Salvar Alterações</button>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAIS: PEDIR CRIATIVO */}
              {isCreativeModalOpen && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print overflow-y-auto">
                  <div className="bg-[#0f1523] border border-fuchsia-500/30 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative my-auto">
                    <button onClick={() => setIsCreativeModalOpen(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-palette text-fuchsia-500"></i> Pedir Criativo</h2>
                    <form onSubmit={handleAddCreative} className="space-y-4">
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Quem está pedindo?</label>
                        <input required type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" value={newCreative.requestedBy} onChange={e => setNewCreative({...newCreative, requestedBy: e.target.value})} />
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Cliente</label>
                        <select className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" value={newCreative.client} onChange={e => setNewCreative({...newCreative, client: e.target.value})}>
                          {clientes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">O que precisa ser feito?</label>
                        <input required type="text" placeholder="Ex: Vídeo Reels" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" value={newCreative.title} onChange={e => setNewCreative({...newCreative, title: e.target.value})} />
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Detalhes da Arte/Copy</label>
                        <textarea required rows="2" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" value={newCreative.content} onChange={e => setNewCreative({...newCreative, content: e.target.value})} />
                      </div>
                      
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2"><i className="fa-solid fa-paperclip"></i> Anexar Imagem / Referência (Opcional)</label>
                        <input type="file" accept="image/*" onChange={(e) => handleFileUpload(e, setNewCreative, newCreative)} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-gray-300 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-white/10 file:text-white hover:file:bg-white/20 cursor-pointer text-sm" />
                        {newCreative.attachment && <div className="mt-2 text-xs text-green-400 font-bold"><i className="fa-solid fa-check"></i> Imagem anexada para a designer!</div>}
                      </div>

                      <button type="submit" className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-3 rounded-xl mt-4">Enviar Pedido de Arte</button>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL: EDITAR CRIATIVO */}
              {isEditCreativeModalOpen && editingCreative && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                  <div className="bg-[#0f1523] border border-fuchsia-500/30 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative">
                    <button onClick={() => setIsEditCreativeModalOpen(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-pen text-fuchsia-500"></i> Ajustar Criativo</h2>
                    <form onSubmit={salvarEdicaoCriativo} className="space-y-4">
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Título do Pedido</label>
                        <input required type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" value={editingCreative.title} onChange={e => setEditingCreative({...editingCreative, title: e.target.value})} />
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Detalhes da Produção</label>
                        <textarea required rows="4" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none resize-none" value={editingCreative.content} onChange={e => setEditingCreative({...editingCreative, content: e.target.value})} />
                      </div>
                      <button type="submit" className="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-3 rounded-xl mt-4">Salvar Alterações</button>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAIS: ANÚNCIOS (IMAGEM MANUAL) */}
              {isAdModalOpen && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                  <div className="bg-[#0f1523] border border-green-500/30 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative max-h-[90vh] overflow-y-auto">
                    <button onClick={() => setIsAdModalOpen(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3"><i className="fa-solid fa-image text-green-500"></i> Subir Anúncio</h2>
                    <form onSubmit={handleAddAd} className="space-y-4">
                      <div className="grid grid-cols-2 gap-4">
                        <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Cliente</label>
                          <select className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={newAd.client} onChange={e => setNewAd({...newAd, client: e.target.value})}>
                            {clientes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                          </select>
                        </div>
                        <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Plataforma</label>
                          <select className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={newAd.platform} onChange={e => setNewAd({...newAd, platform: e.target.value})}>
                            <option value="Meta Ads">Meta Ads</option><option value="Google Ads">Google Ads</option><option value="TikTok Ads">TikTok Ads</option>
                          </select>
                        </div>
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Título Interno</label>
                        <input required type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={newAd.title} onChange={e => setNewAd({...newAd, title: e.target.value})} />
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Copy (Texto)</label>
                        <textarea required rows="4" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white" value={newAd.copy} onChange={e => setNewAd({...newAd, copy: e.target.value})} />
                      </div>
                      <div><label className="block text-xs font-bold text-gray-400 uppercase mb-2">Subir Imagem do Computador</label>
                        <input type="file" accept="image/*" onChange={(e) => handleFileUpload(e, setNewAd, newAd, 'imageUrl')} className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-gray-300 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-white/10 file:text-white hover:file:bg-white/20 cursor-pointer text-sm" />
                        {newAd.imageUrl && <div className="mt-3 relative h-20 w-20 rounded-xl overflow-hidden border border-green-500/50"><img src={newAd.imageUrl} className="w-full h-full object-cover" /></div>}
                      </div>
                      <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl mt-4">Publicar Vitrine</button>
                    </form>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
