<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tráfego Studio - Central de Produção</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      input[type=range] { accent-color: #a855f7; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DADOS ---
        const CLIENTES = {
          MOTEIS: { id: 'moteis', name: 'Motéis', theme: 'from-rose-500 to-pink-600', text: 'text-pink-400', bg: 'bg-pink-500/10', border: 'border-pink-500/30' },
          CUBO:   { id: 'cubo',   name: 'Cubo Self', theme: 'from-cyan-500 to-blue-600', text: 'text-cyan-400', bg: 'bg-cyan-500/10', border: 'border-cyan-500/30' },
          VIV:    { id: 'viv',    name: 'ViV', theme: 'from-purple-500 to-fuchsia-600', text: 'text-fuchsia-400', bg: 'bg-fuchsia-500/10', border: 'border-fuchsia-500/30' }
        };

        const TAREFAS_MOCK = [
          { id: '1', title: 'Campanha Dia dos Namorados', client: CLIENTES.MOTEIS, solicitante: 'Juan', responsavel: '', startDate: '2026-04-05', deadline: '10/05', status: 'doing', progress: 75, platform: 'Meta Ads', prioridade: 'Normal', notes: 'Focar na nova suíte presidencial.\nPedir as fotos oficiais para o Juan até quarta-feira.' },
          { id: '6', title: 'Ajustar Lances de Leilão de Busca', client: CLIENTES.CUBO, solicitante: 'Juan', responsavel: '', startDate: '2026-04-08', deadline: 'Hoje', status: 'doing', progress: 40, platform: 'Google Ads', prioridade: 'Alta', notes: '' },
          { id: '2', title: 'Otimização de Palavras-chave (Negativar)', client: CLIENTES.CUBO, solicitante: '', responsavel: '', deadline: '12/04', status: 'review', platform: 'Google Ads', prioridade: 'Normal' },
          { id: '3', title: 'Estruturar Landing Page Nova Coleção', client: CLIENTES.VIV, solicitante: '', responsavel: '', deadline: '20/04', status: 'todo', platform: 'Web', prioridade: 'Normal' },
          { id: '7', title: 'Promoção Relâmpago de Feriado', client: CLIENTES.MOTEIS, solicitante: 'Juan', responsavel: '', deadline: 'Urgente', status: 'inbox', platform: 'Meta Ads', prioridade: 'Urgente' },
          { id: '8', title: 'Relatório Mensal de Março', client: CLIENTES.VIV, solicitante: '', responsavel: '', startDate: '2026-04-01', deadline: '05/04', status: 'done', progress: 100, platform: 'Data Studio', prioridade: 'Normal' },
        ];

        const CRIATIVOS_MOCK = [
          { id: '1', title: 'CRIATIVO NOVO: Carrossel Dia das Mães', client: CLIENTES.VIV, content: 'Precisamos de 3 imagens no estilo minimalista mostrando a nova coleção. Focar nas cores pastéis.', link: 'https://drive.google.com/exemplo-referencia', status: 'pendente' }
        ];

        const ANUNCIOS_MOCK = [
          { id: '101', client: 'moteis', platform: 'Meta', title: 'Carrossel Suítes Premium', copy: 'Surpreenda quem você ama neste final de semana. Conheça novas suítes premium com hidro e teto solar.', imageUrl: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&q=80&w=400&h=300' },
          { id: '202', client: 'cubo', platform: 'Meta', title: 'Vídeo Institucional - Segurança', copy: 'Seus bens guardados com a mesma segurança de um banco. 🔒 Assista ao vídeo.', imageUrl: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=400&h=300' },
        ];

        const loadLocal = (key, fallback) => {
            try { const i = window.localStorage.getItem('trafego2_' + key); return i ? JSON.parse(i) : fallback; }
            catch (e) { return fallback; }
        };
        const saveLocal = (key, data) => {
            try { window.localStorage.setItem('trafego2_' + key, JSON.stringify(data)); }
            catch (e) { console.error(e); }
        };

        // --- ESTADO INICIAL DO FORMULÁRIO "NOVA DEMANDA" ---
        const NOVA_DEMANDA_VAZIA = {
          title: '', client: 'moteis', solicitante: '', responsavel: '',
          status: 'inbox', prioridade: 'Normal', platform: 'Meta Ads',
          deadline: '', startDate: '', progress: 0, notes: ''
        };

        function App() {
          const [activeAdTab, setActiveAdTab] = useState('moteis');
          const [tasks, setTasks]       = useState(() => loadLocal('tasks',     TAREFAS_MOCK));
          const [anuncios, setAnuncios] = useState(() => loadLocal('anuncios',  ANUNCIOS_MOCK));
          const [criativos, setCriativos] = useState(() => loadLocal('criativos', CRIATIVOS_MOCK));

          // Modais
          const [isAdModalOpen,        setIsAdModalOpen]        = useState(false);
          const [isCreativeModalOpen,  setIsCreativeModalOpen]  = useState(false);
          const [isEditTaskModalOpen,  setIsEditTaskModalOpen]  = useState(false);
          const [isNovaDemandaOpen,    setIsNovaDemandaOpen]    = useState(false);
          const [editingTask,          setEditingTask]          = useState(null);

          const [newAd,       setNewAd]       = useState({ title: '', copy: '', client: 'moteis', platform: 'Meta', imageUrl: '' });
          const [newCreative, setNewCreative] = useState({ title: 'CRIATIVO NOVO: ', content: '', client: 'moteis', link: '' });
          const [novaDemanda, setNovaDemanda] = useState({ ...NOVA_DEMANDA_VAZIA });

          // --- SYNC ---
          const syncData = (colName, item) => {
            if (colName === 'tasks') setTasks(curr => {
              const i = curr.findIndex(x => String(x.id) === String(item.id));
              const ns = i > -1 ? Object.assign([], curr, {[i]: item}) : [item, ...curr];
              saveLocal('tasks', ns); return ns;
            });
            if (colName === 'anuncios') setAnuncios(curr => {
              const i = curr.findIndex(x => String(x.id) === String(item.id));
              const ns = i > -1 ? Object.assign([], curr, {[i]: item}) : [item, ...curr];
              saveLocal('anuncios', ns); return ns;
            });
            if (colName === 'criativos') setCriativos(curr => {
              const i = curr.findIndex(x => String(x.id) === String(item.id));
              const ns = i > -1 ? Object.assign([], curr, {[i]: item}) : [item, ...curr];
              saveLocal('criativos', ns); return ns;
            });
          };

          const deleteData = (colName, itemId) => {
            if (colName === 'criativos') setCriativos(curr => { const ns = curr.filter(c => String(c.id) !== String(itemId)); saveLocal('criativos', ns); return ns; });
            if (colName === 'tasks') setTasks(curr => { const ns = curr.filter(c => String(c.id) !== String(itemId)); saveLocal('tasks', ns); return ns; });
          };

          // --- LÓGICA ---
          const doingTasks  = tasks.filter(t => t.status === 'doing');
          const queueTasks  = tasks.filter(t => t.status !== 'doing' && t.status !== 'inbox' && t.status !== 'done');
          const inboxTasks  = tasks.filter(t => t.status === 'inbox');
          const doneTasks   = tasks.filter(t => t.status === 'done');

          const getTempoDecorrido = (d) => {
            if (!d) return '0 dias';
            const diff = Math.ceil(Math.abs(new Date() - new Date(d)) / 86400000);
            return diff === 1 ? '1 dia' : `${diff} dias`;
          };

          const clienteById = (id) => Object.values(CLIENTES).find(c => c.id === id) || CLIENTES.MOTEIS;

          const aprovarParaFila    = (id) => { const t = tasks.find(t => String(t.id) === String(id)); if(t) syncData('tasks', {...t, status: 'todo'}); };
          const moverParaFinalizado = (id) => {
            const t = tasks.find(t => String(t.id) === String(id)) || editingTask;
            if(t) syncData('tasks', {...t, status: 'done', progress: 100});
            if(isEditTaskModalOpen) setIsEditTaskModalOpen(false);
          };
          const atualizarNotaTarefa = (id, nota) => setTasks(curr => curr.map(t => String(t.id) === String(id) ? {...t, notes: nota} : t));
          const salvarNotaFinal     = (task) => syncData('tasks', task);

          const abrirEdicaoTarefa = (task) => { setEditingTask({...task}); setIsEditTaskModalOpen(true); };
          const salvarEdicaoTarefa = (e) => { e.preventDefault(); syncData('tasks', editingTask); setIsEditTaskModalOpen(false); };

          // NOVA DEMANDA — cria task com todos os campos
          const handleCriarDemanda = (e) => {
            e.preventDefault();
            const clienteObj = clienteById(novaDemanda.client);
            const task = {
              ...novaDemanda,
              id: Date.now().toString(),
              client: clienteObj,
              progress: Number(novaDemanda.progress) || 0,
            };
            syncData('tasks', task);
            setIsNovaDemandaOpen(false);
            setNovaDemanda({ ...NOVA_DEMANDA_VAZIA });
          };

          const handleAddAd = (e) => {
            e.preventDefault();
            syncData('anuncios', { ...newAd, id: Date.now().toString() });
            setIsAdModalOpen(false);
            setNewAd({ title: '', copy: '', client: 'moteis', platform: 'Meta', imageUrl: '' });
          };

          const handleAddCreative = (e) => {
            e.preventDefault();
            const clienteObj = clienteById(newCreative.client);
            syncData('criativos', { ...newCreative, id: Date.now().toString(), client: clienteObj, status: 'pendente' });
            setIsCreativeModalOpen(false);
            setNewCreative({ title: 'CRIATIVO NOVO: ', content: '', client: 'moteis', link: '' });
          };

          const prioridadeCor = (p) => {
            if (p === 'Urgente') return 'text-red-400 bg-red-500/10 border-red-500/30';
            if (p === 'Alta')    return 'text-orange-400 bg-orange-500/10 border-orange-500/30';
            return 'text-gray-400 bg-white/5 border-white/10';
          };

          // ============ RENDER ============
          return (
            <div className="min-h-screen bg-[#070b14] font-sans text-gray-200 overflow-x-hidden selection:bg-fuchsia-500/30 pb-20">
              
              {/* BG blur orbs */}
              <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-purple-900/20 blur-[120px]"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/20 blur-[120px]"></div>
              </div>

              <main className="max-w-7xl mx-auto p-6 lg:p-10 space-y-12">
                
                {/* ===== HEADER ===== */}
                <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-white/5 pb-8">
                  <div>
                    <div className="flex items-center gap-2 mb-2">
                      <i className="fa-solid fa-wand-magic-sparkles text-fuchsia-400"></i>
                      <span className="text-sm font-semibold tracking-wider text-fuchsia-400 uppercase">Tráfego Studio</span>
                    </div>
                    <h1 className="text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500 tracking-tight">
                      Central de Produção
                    </h1>
                    <p className="text-gray-400 mt-2 flex items-center gap-2">
                      <span className="relative flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-blue-400"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                      </span>
                      Salvo localmente no navegador
                    </p>
                  </div>

                  <div className="flex items-center gap-3 flex-wrap">
                    {/* Contador Solicitações */}
                    <div className="bg-yellow-500/10 border border-yellow-500/20 rounded-2xl px-5 py-3 backdrop-blur-md cursor-pointer hover:bg-yellow-500/20 transition-colors" onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
                      <div className="text-2xl font-bold text-yellow-400">{inboxTasks.length < 10 ? `0${inboxTasks.length}` : inboxTasks.length}</div>
                      <div className="text-xs text-gray-400 uppercase tracking-wider mt-1">Solicitações</div>
                    </div>
                    {/* Contador Em Foco */}
                    <div className="bg-white/5 border border-white/10 rounded-2xl px-5 py-3 backdrop-blur-md">
                      <div className="text-2xl font-bold text-white">{doingTasks.length < 10 ? `0${doingTasks.length}` : doingTasks.length}</div>
                      <div className="text-xs text-gray-400 uppercase tracking-wider mt-1">Em Foco</div>
                    </div>
                    {/* Botão Nova Demanda */}
                    <button
                      onClick={() => setIsNovaDemandaOpen(true)}
                      className="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white border border-purple-500/50 px-5 py-3 rounded-2xl text-sm font-bold transition-all shadow-lg hover:shadow-purple-500/30 hover:-translate-y-0.5"
                    >
                      <i className="fa-solid fa-plus"></i> Nova Demanda
                    </button>
                  </div>
                </header>

                {/* ===== SOLICITAÇÕES DO JUAN (INBOX) ===== */}
                <section className="bg-yellow-500/5 border border-yellow-500/20 rounded-3xl p-6 lg:p-8 relative overflow-hidden">
                  <div className="absolute top-[-50px] right-[-50px] w-40 h-40 bg-yellow-500/10 rounded-full blur-3xl pointer-events-none"></div>
                  
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 relative z-10">
                    <div className="flex items-center gap-3">
                      <div className="p-3 bg-yellow-500/20 text-yellow-400 rounded-lg shadow-[0_0_15px_rgba(234,179,8,0.2)] flex items-center justify-center">
                        <i className="fa-solid fa-inbox"></i>
                      </div>
                      <div>
                        <h2 className="text-2xl font-bold text-white">Solicitações do Juan</h2>
                        <p className="text-sm text-gray-400">Aguardando aprovação e triagem do Marketing</p>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 relative z-10">
                    {inboxTasks.map(task => (
                      <div key={task.id} className="bg-gray-900/60 border border-yellow-500/20 p-5 rounded-2xl flex flex-col justify-between hover:border-yellow-500/40 transition-colors shadow-sm">
                        <div>
                          <div className="flex justify-between items-start mb-3">
                            <span className={`px-2 py-1 text-[10px] font-bold uppercase tracking-wider rounded-md ${task.client.bg} ${task.client.text} border ${task.client.border}`}>
                              {task.client.name}
                            </span>
                            {task.prioridade && task.prioridade !== 'Normal' && (
                              <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md border flex items-center gap-1 ${prioridadeCor(task.prioridade)}`}>
                                {task.prioridade === 'Urgente' ? '🔴' : '🟠'} {task.prioridade}
                              </span>
                            )}
                          </div>
                          <h4 className="text-white font-semibold mb-1">{task.title}</h4>
                          {task.solicitante && <p className="text-xs text-gray-500 mb-1"><i className="fa-regular fa-user mr-1"></i>{task.solicitante}</p>}
                          <p className="text-xs text-gray-400">Prazo: <strong className="text-gray-300">{task.deadline}</strong>{task.platform && <span className="text-gray-500"> · {task.platform}</span>}</p>
                        </div>
                        
                        <div className="flex gap-2 mt-4">
                          <button 
                            onClick={() => aprovarParaFila(task.id)}
                            className="flex-1 flex items-center justify-center gap-2 bg-white/5 hover:bg-green-500/20 text-gray-300 hover:text-green-400 border border-white/10 hover:border-green-500/30 py-2.5 rounded-xl text-xs font-bold transition-all group"
                          >
                            <i className="fa-solid fa-check group-hover:scale-125 transition-transform"></i> Aprovar p/ Fila
                          </button>
                          <button onClick={() => abrirEdicaoTarefa(task)} className="bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white border border-white/10 px-3 rounded-xl text-xs transition-all">
                            <i className="fa-regular fa-pen-to-square"></i>
                          </button>
                        </div>
                      </div>
                    ))}
                    
                    {inboxTasks.length === 0 && (
                      <div className="col-span-full py-8 text-center border border-white/5 border-dashed rounded-2xl bg-white/[0.01]">
                        <p className="text-gray-500">Nenhuma solicitação pendente. Caixa de entrada zerada! 🎉</p>
                      </div>
                    )}
                  </div>
                </section>

                {/* ===== ESTEIRA + CRIATIVOS ===== */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  
                  {/* Em Foco */}
                  <section className="lg:col-span-7 space-y-6">
                    <div className="flex items-center gap-3">
                      <div className="p-3 bg-orange-500/20 text-orange-400 rounded-lg flex items-center justify-center">
                        <i className="fa-solid fa-fire"></i>
                      </div>
                      <h2 className="text-2xl font-bold text-white">Esteira de Produção</h2>
                    </div>
                    
                    <div className="grid gap-5">
                      {doingTasks.map(task => (
                        <div key={task.id} className="relative group rounded-3xl bg-gray-900/50 border border-white/5 p-1 overflow-hidden backdrop-blur-sm hover:border-white/20 transition-all duration-500">
                          <div className={`absolute top-0 left-0 w-1 h-full bg-gradient-to-b ${task.client.theme}`}></div>
                          <div className="p-6">
                            <div className="flex justify-between items-start mb-4 flex-wrap gap-2">
                              <div className="flex items-center gap-2 flex-wrap">
                                <span className={`px-3 py-1 text-xs font-bold uppercase tracking-wider rounded-full ${task.client.bg} ${task.client.text} border ${task.client.border}`}>
                                  {task.client.name}
                                </span>
                                {task.solicitante && <span className="text-xs text-gray-500"><i className="fa-regular fa-user mr-1"></i>{task.solicitante}</span>}
                              </div>
                              <div className="flex gap-2">
                                <span className="flex items-center gap-1.5 text-xs font-medium text-gray-400 bg-black/40 px-3 py-1 rounded-full">
                                  <i className="fa-regular fa-clock text-orange-400"></i> Entrega: {task.deadline}
                                </span>
                                <button onClick={() => abrirEdicaoTarefa(task)} className="bg-white/5 hover:bg-white/10 text-gray-300 px-3 py-1 rounded-full text-xs font-bold transition-colors border border-white/10">
                                  <i className="fa-solid fa-pen mr-1"></i>Editar
                                </button>
                              </div>
                            </div>
                            
                            <h3 className="text-xl font-bold text-white mb-4 pr-4">{task.title}</h3>
                            
                            <div className="flex items-center gap-4 mb-6 bg-black/30 p-3 rounded-xl border border-white/5 flex-wrap">
                              <div className="flex flex-col">
                                <span className="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Iniciado em</span>
                                <span className="text-sm font-semibold text-gray-300">{task.startDate ? new Date(task.startDate + 'T12:00:00').toLocaleDateString('pt-BR') : 'Não definido'}</span>
                              </div>
                              <div className="w-px h-8 bg-white/10"></div>
                              <div className="flex flex-col">
                                <span className="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Tempo na Esteira</span>
                                <span className="text-sm font-bold text-orange-400">{getTempoDecorrido(task.startDate)}</span>
                              </div>
                              {task.platform && <>
                                <div className="w-px h-8 bg-white/10"></div>
                                <div className="flex flex-col">
                                  <span className="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Plataforma</span>
                                  <span className="text-sm font-semibold text-gray-300">{task.platform}</span>
                                </div>
                              </>}
                            </div>
                            
                            <div className="space-y-2 mb-6">
                              <div className="flex justify-between text-xs text-gray-400 font-medium">
                                <span>Progresso da Demanda</span>
                                <span className={task.client.text}>{task.progress || 0}%</span>
                              </div>
                              <div className="w-full bg-black/50 rounded-full h-2.5 overflow-hidden">
                                <div 
                                  className={`h-2.5 rounded-full bg-gradient-to-r ${task.client.theme} relative`}
                                  style={{ width: `${task.progress || 0}%` }}
                                >
                                  <div className="absolute top-0 right-0 bottom-0 w-4 bg-white/30 animate-pulse"></div>
                                </div>
                              </div>
                            </div>
                            
                            {/* Mural */}
                            <div className={`p-1 rounded-2xl bg-gradient-to-br ${task.client.theme} shadow-lg shadow-black/20`}>
                              <div className="bg-black/40 backdrop-blur-md rounded-xl p-3">
                                <div className="flex items-center justify-between mb-2">
                                  <span className="text-xs font-bold text-white uppercase tracking-wider flex items-center gap-2">
                                    <i className="fa-solid fa-pen-to-square"></i> Observações / Mural
                                  </span>
                                </div>
                                <textarea 
                                  className="w-full bg-black/20 text-white placeholder-white/50 text-sm p-3 rounded-lg border border-white/10 outline-none focus:border-white/40 focus:bg-black/40 transition-all resize-y min-h-[80px]"
                                  placeholder="Escreva aqui suas ideias, o que a equipe disse, links úteis..."
                                  value={task.notes || ''}
                                  onChange={(e) => atualizarNotaTarefa(task.id, e.target.value)}
                                  onBlur={() => salvarNotaFinal(task)}
                                />
                              </div>
                            </div>

                            {/* Ação rápida: Finalizar */}
                            <button
                              onClick={() => moverParaFinalizado(task.id)}
                              className="mt-4 w-full flex items-center justify-center gap-2 bg-emerald-600/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 hover:border-emerald-500/40 py-2.5 rounded-xl text-xs font-bold transition-all"
                            >
                              <i className="fa-solid fa-check-double"></i> Finalizar Demanda
                            </button>
                          </div>
                        </div>
                      ))}
                      {doingTasks.length === 0 && <p className="text-center text-gray-500 py-4 text-sm">Nenhuma tarefa em foco no momento.</p>}
                    </div>
                  </section>

                  {/* Criativos + Esteira */}
                  <section className="lg:col-span-5 space-y-8">
                    {/* Fábrica de Criativos */}
                    <div className="space-y-6">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <div className="p-3 bg-fuchsia-500/20 text-fuchsia-400 rounded-lg flex items-center justify-center">
                            <i className="fa-solid fa-palette"></i>
                          </div>
                          <h2 className="text-xl font-bold text-white">Fábrica de Criativos</h2>
                        </div>
                        <button 
                          onClick={() => setIsCreativeModalOpen(true)}
                          className="bg-fuchsia-600 hover:bg-fuchsia-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center gap-2"
                        >

                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nome do Anúncio</label>
                        <input 
                          required type="text" placeholder="Ex: Carrossel Dia das Mães"
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-green-500/50 placeholder-gray-600"
                          value={newAd.title} onChange={e => setNewAd({...newAd, title: e.target.value})}
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Copy (Texto do Anúncio)</label>
                        <textarea 
                          required rows="3"
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-green-500/50"
                          value={newAd.copy} onChange={e => setNewAd({...newAd, copy: e.target.value})}
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Link da Imagem (Opcional)</label>
                        <input 
                          type="url" placeholder="https://..."
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-green-500/50 placeholder-gray-600"
                          value={newAd.imageUrl} onChange={e => setNewAd({...newAd, imageUrl: e.target.value})}
                        />
                      </div>
                      <div className="flex gap-3 pt-2">
                        <button type="button" onClick={() => setIsAdModalOpen(false)} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 font-bold py-3 rounded-xl transition-colors">
                          Cancelar
                        </button>
                        <button type="submit" className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-colors">
                          Publicar no Painel
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* ===== MODAL: EDITAR TAREFA ===== */}
              {isEditTaskModalOpen && editingTask && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f1523] border border-blue-500/30 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative max-h-[90vh] overflow-y-auto">
                    <button onClick={() => setIsEditTaskModalOpen(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white">
                      <i className="fa-solid fa-xmark text-xl"></i>
                    </button>
                    <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                      <i className="fa-solid fa-pen-to-square text-blue-500"></i> Editar Demanda
                    </h2>
                    <form onSubmit={salvarEdicaoTarefa} className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Título</label>
                        <input 
                          required type="text"
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                          value={editingTask.title} onChange={e => setEditingTask({...editingTask, title: e.target.value})}
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Cliente</label>
                          <select 
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                            value={editingTask.client?.id || 'moteis'} 
                            onChange={e => setEditingTask({...editingTask, client: clienteById(e.target.value)})}
                          >
                            {Object.values(CLIENTES).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Solicitante</label>
                          <input 
                            type="text" placeholder="Ex: Juan"
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50 placeholder-gray-600"
                            value={editingTask.solicitante || ''} onChange={e => setEditingTask({...editingTask, solicitante: e.target.value})}
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Responsável (Marketing)</label>
                        <input 
                          type="text" placeholder="Ex: Ana Silva, Marina"
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50 placeholder-gray-600"
                          value={editingTask.responsavel || ''} onChange={e => setEditingTask({...editingTask, responsavel: e.target.value})}
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Status</label>
                          <select 
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                            value={editingTask.status} onChange={e => setEditingTask({...editingTask, status: e.target.value})}
                          >
                            <option value="inbox">Inbox</option>
                            <option value="todo">Fila (A Fazer)</option>
                            <option value="doing">Em Foco (Tráfego)</option>
                            <option value="review">Em Aprovação</option>
                            <option value="done">Finalizado</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Prioridade</label>
                          <select 
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                            value={editingTask.prioridade || 'Normal'} onChange={e => setEditingTask({...editingTask, prioridade: e.target.value})}
                          >
                            <option value="Normal">Normal</option>
                            <option value="Alta">Alta</option>
                            <option value="Urgente">Urgente 🔴</option>
                          </select>
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Plataforma</label>
                          <select 
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                            value={editingTask.platform || 'Meta Ads'} onChange={e => setEditingTask({...editingTask, platform: e.target.value})}
                          >
                            <option>Meta Ads</option>
                            <option>Google Ads</option>
                            <option>TikTok Ads</option>
                            <option>YouTube</option>
                            <option>LinkedIn</option>
                            <option>Site/LP</option>
                            <option>Data Studio</option>
                            <option>Outros</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Prazo Final</label>
                          <input 
                            type="text" placeholder="Ex: 10/05 ou Hoje"
                            className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50 placeholder-gray-600"
                            value={editingTask.deadline || ''} onChange={e => setEditingTask({...editingTask, deadline: e.target.value})}
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Data de Início</label>
                        <input 
                          type="date"
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50"
                          value={editingTask.startDate || ''} onChange={e => setEditingTask({...editingTask, startDate: e.target.value})}
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Progresso: <span className="text-blue-400">{editingTask.progress || 0}%</span></label>
                        <input 
                          type="range" min="0" max="100"
                          className="w-full"
                          value={editingTask.progress || 0} onChange={e => setEditingTask({...editingTask, progress: parseInt(e.target.value)})}
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Observações</label>
                        <textarea 
                          rows="3" placeholder="Notas, links, contexto..."
                          className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500/50 placeholder-gray-600"
                          value={editingTask.notes || ''} onChange={e => setEditingTask({...editingTask, notes: e.target.value})}
                        />
                      </div>

                      <div className="flex gap-3 mt-6 pt-4 border-t border-white/10">
                        <button type="button" onClick={() => { deleteData('tasks', editingTask.id); setIsEditTaskModalOpen(false); }} className="bg-red-600/20 hover:bg-red-500/30 text-red-400 border border-red-500/30 p-3 rounded-xl transition-colors">
                          <i className="fa-solid fa-trash"></i>
                        </button>
                        <button type="button" onClick={() => moverParaFinalizado(editingTask.id)} className="flex-1 bg-emerald-600/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 font-bold py-3 rounded-xl transition-colors">
                          <i className="fa-solid fa-check-double mr-2"></i>Finalizar
                        </button>
                        <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors">
                          <i className="fa-solid fa-floppy-disk mr-2"></i>Salvar
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
