<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tráfego Studio - Central de Produção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      input[type=range] { accent-color: #a855f7; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

      @keyframes slideUp { from { transform:translateY(60px); opacity:0; } to { transform:translateY(0); opacity:1; } }
      .slide-up { animation: slideUp 0.25s cubic-bezier(.22,.61,.36,1); }

      @keyframes fadeIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
      .fade-in { animation: fadeIn 0.18s ease; }

      /* Kanban */
      .kanban-wrap { display:flex; gap:16px; overflow-x:auto; padding-bottom:16px; min-height:520px; }
      .kanban-col { flex:0 0 280px; display:flex; flex-direction:column; min-height:400px; }
      .kanban-col-body { flex:1; overflow-y:auto; min-height:120px; border-radius:16px; padding:8px; transition: background 0.2s, border-color 0.2s; }
      .kanban-col-body.drag-over { background: rgba(168,85,247,0.08) !important; border-color: rgba(168,85,247,0.4) !important; }

      .task-card { cursor:grab; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; user-select:none; }
      .task-card:active { cursor:grabbing; }
      .task-card.dragging { opacity:0.35; transform:scale(0.97); }
      .task-card.drag-ghost { transform:rotate(-1.5deg) scale(1.03); box-shadow:0 20px 60px rgba(0,0,0,0.6); }

      .kanban-wrap::-webkit-scrollbar { height: 6px; }
      .kanban-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

      .lbl { display:block; font-size:0.65rem; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.5rem; }
      .inp { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:0.75rem; padding:0.75rem 1rem; color:white; outline:none; transition:border-color 0.2s; resize:vertical; }
      .inp::placeholder { color:#4b5563; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── PALETA ─────────────────────────────────────────────────────
const PALETA = [
  { id:'rosa',     label:'Rosa',     dot:'#f43f5e', theme:'from-rose-500 to-pink-600',      text:'text-pink-400',    bg:'bg-pink-500/10',    border:'border-pink-500/30' },
  { id:'ciano',    label:'Ciano',    dot:'#06b6d4', theme:'from-cyan-500 to-blue-600',      text:'text-cyan-400',    bg:'bg-cyan-500/10',    border:'border-cyan-500/30' },
  { id:'fucsia',   label:'Fúcsia',   dot:'#a855f7', theme:'from-purple-500 to-fuchsia-600', text:'text-fuchsia-400', bg:'bg-fuchsia-500/10', border:'border-fuchsia-500/30' },
  { id:'laranja',  label:'Laranja',  dot:'#f97316', theme:'from-orange-500 to-amber-600',   text:'text-orange-400',  bg:'bg-orange-500/10',  border:'border-orange-500/30' },
  { id:'verde',    label:'Verde',    dot:'#22c55e', theme:'from-green-500 to-emerald-600',  text:'text-green-400',   bg:'bg-green-500/10',   border:'border-green-500/30' },
  { id:'amarelo',  label:'Amarelo',  dot:'#eab308', theme:'from-yellow-500 to-amber-500',   text:'text-yellow-400',  bg:'bg-yellow-500/10',  border:'border-yellow-500/30' },
  { id:'indigo',   label:'Índigo',   dot:'#6366f1', theme:'from-indigo-500 to-violet-600',  text:'text-indigo-400',  bg:'bg-indigo-500/10',  border:'border-indigo-500/30' },
  { id:'vermelho', label:'Vermelho', dot:'#ef4444', theme:'from-red-500 to-rose-700',       text:'text-red-400',     bg:'bg-red-500/10',     border:'border-red-500/30' },
];

// ── COLUNAS DO KANBAN ───────────────────────────────────────────
const COLUNAS = [
  { id:'inbox',  label:'Inbox',     icon:'fa-inbox',       color:'text-yellow-400',  bg:'bg-yellow-500/10',  border:'border-yellow-500/25', headerBg:'bg-yellow-500/10' },
  { id:'todo',   label:'Fila',      icon:'fa-list-check',  color:'text-blue-400',    bg:'bg-blue-500/10',    border:'border-blue-500/25',   headerBg:'bg-blue-500/10' },
  { id:'doing',  label:'Em Foco',   icon:'fa-fire',        color:'text-orange-400',  bg:'bg-orange-500/10',  border:'border-orange-500/25', headerBg:'bg-orange-500/10' },
  { id:'review', label:'Revisão',   icon:'fa-eye',         color:'text-purple-400',  bg:'bg-purple-500/10',  border:'border-purple-500/25', headerBg:'bg-purple-500/10' },
  { id:'done',   label:'Finalizado',icon:'fa-check-double',color:'text-emerald-400', bg:'bg-emerald-500/10', border:'border-emerald-500/25',headerBg:'bg-emerald-500/10' },
];

// ── DADOS MOCK ──────────────────────────────────────────────────
const CLIENTES_INICIAIS = [
  { id:'moteis', name:'Motéis',    paletaId:'rosa',   ...PALETA.find(p=>p.id==='rosa')   },
  { id:'cubo',   name:'Cubo Self', paletaId:'ciano',  ...PALETA.find(p=>p.id==='ciano')  },
  { id:'viv',    name:'ViV',       paletaId:'fucsia', ...PALETA.find(p=>p.id==='fucsia') },
];

const TAREFAS_MOCK = [
  { id:'1', title:'Campanha Dia dos Namorados',         clientId:'moteis', solicitante:'Juan',   responsavel:'', startDate:'2026-04-05', deadline:'10/05', status:'doing',  progress:75, platform:'Meta Ads',   prioridade:'Normal', notes:'Focar na nova suíte presidencial.\nPedir fotos oficiais até quarta.' },
  { id:'6', title:'Ajustar Lances de Leilão de Busca',  clientId:'cubo',   solicitante:'Carlos', responsavel:'', startDate:'2026-04-08', deadline:'Hoje',  status:'doing',  progress:40, platform:'Google Ads', prioridade:'Alta',   notes:'' },
  { id:'2', title:'Otimização de Palavras-chave',        clientId:'cubo',   solicitante:'',       responsavel:'', deadline:'12/04',       status:'review', platform:'Google Ads', prioridade:'Normal' },
  { id:'3', title:'Estruturar Landing Page Nova Coleção',clientId:'viv',    solicitante:'',       responsavel:'', deadline:'20/04',       status:'todo',   platform:'Web',        prioridade:'Normal' },
  { id:'7', title:'Promoção Relâmpago de Feriado',       clientId:'moteis', solicitante:'Juan',   responsavel:'', deadline:'Urgente',     status:'inbox',  platform:'Meta Ads',   prioridade:'Urgente' },
  { id:'9', title:'Análise de Concorrência Q2',          clientId:'viv',    solicitante:'',       responsavel:'', deadline:'30/04',       status:'todo',   platform:'Data Studio', prioridade:'Normal' },
  { id:'8', title:'Relatório Mensal de Março',           clientId:'viv',    solicitante:'',       responsavel:'', startDate:'2026-04-01', deadline:'05/04',status:'done',   progress:100, platform:'Data Studio', prioridade:'Normal' },
];

const CRIATIVOS_MOCK = [
  { id:'1', title:'CRIATIVO NOVO: Carrossel Dia das Mães', clientId:'viv', content:'3 imagens estilo minimalista nova coleção. Focar nas cores pastéis.', link:'https://drive.google.com/exemplo', status:'pendente' }
];
const ANUNCIOS_MOCK = [
  { id:'101', clientId:'moteis', platform:'Meta',   title:'Carrossel Suítes Premium',     copy:'Surpreenda quem você ama neste final de semana. Suítes premium com hidro e teto solar.', imageUrl:'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&q=80&w=400&h=300' },
  { id:'202', clientId:'cubo',   platform:'Meta',   title:'Vídeo Institucional - Segurança',copy:'Seus bens guardados com a mesma segurança de um banco. 🔒', imageUrl:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=400&h=300' },
];

// ── LOCALSTORAGE ────────────────────────────────────────────────
const load = (k, fb) => { try { const v = localStorage.getItem('ts4_'+k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
const save = (k, v)  => { try { localStorage.setItem('ts4_'+k, JSON.stringify(v)); } catch {} };

const NOVA_DEM_VAZIA   = { title:'', clientId:'', solicitante:'', responsavel:'', status:'inbox', prioridade:'Normal', platform:'Meta Ads', deadline:'', startDate:'', progress:0, notes:'' };
const NOVO_CLI_VAZIO   = { name:'', paletaId:'rosa' };

// ── APP ─────────────────────────────────────────────────────────
function App() {
  const [clientes,    setClientes]    = useState(()=>load('clientes',   CLIENTES_INICIAIS));
  const [tasks,       setTasks]       = useState(()=>load('tasks',      TAREFAS_MOCK));
  const [anuncios,    setAnuncios]    = useState(()=>load('anuncios',   ANUNCIOS_MOCK));
  const [criativos,   setCriativos]  = useState(()=>load('criativos',  CRIATIVOS_MOCK));
  const [comentarios, setComentarios]= useState(()=>load('comentarios', {}));
  const [activeAdTab, setActiveAdTab]= useState('');
  const [nomeUsuario, setNomeUsuario]= useState(()=>load('nomeUsuario',''));

  // Drag & Drop
  const [draggingId,  setDraggingId] = useState(null);
  const [dragOverCol, setDragOverCol]= useState(null);

  // Modais
  const [modal,        setModal]       = useState(null);
  const [editingTask,  setEditingTask] = useState(null);
  const [comTaskId,    setComTaskId]   = useState(null);
  const [novoComment,  setNovoComment] = useState('');

  // Forms
  const [novoCliente,  setNovoCliente] = useState({...NOVO_CLI_VAZIO});
  const [novaDemanda,  setNovaDemanda] = useState({...NOVA_DEM_VAZIA});
  const [newCreative,  setNewCreative] = useState({title:'CRIATIVO NOVO: ',content:'',clientId:'',link:''});
  const [newAd,        setNewAd]       = useState({title:'',copy:'',clientId:'',platform:'Meta',imageUrl:''});

  useEffect(()=>{ if(!activeAdTab&&clientes.length) setActiveAdTab(clientes[0].id); },[clientes]);

  // ── HELPERS ──
  const cById = id => clientes.find(c=>c.id===id) || { id:'?',name:'?',theme:'from-gray-500 to-gray-700',text:'text-gray-400',bg:'bg-gray-500/10',border:'border-gray-500/30' };
  const paleta = id => PALETA.find(p=>p.id===id)||PALETA[0];
  const getComs = tid => comentarios[String(tid)]||[];

  const prioColor = p => {
    if (p==='Urgente') return 'text-red-400 bg-red-500/10 border-red-500/30';
    if (p==='Alta')    return 'text-orange-400 bg-orange-500/10 border-orange-500/30';
    return null;
  };

  // ── SYNC ──
  const syncList  = (setter,key,item) => setter(curr=>{
    const i=curr.findIndex(x=>String(x.id)===String(item.id));
    const ns=i>-1?Object.assign([],curr,{[i]:item}):[item,...curr];
    save(key,ns); return ns;
  });
  const delItem   = (setter,key,id) => setter(curr=>{ const ns=curr.filter(x=>String(x.id)!==String(id)); save(key,ns); return ns; });
  const syncTask  = t => syncList(setTasks,'tasks',t);

  // ── DRAG & DROP ──
  const onDragStart = (e, taskId) => {
    setDraggingId(taskId);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
  };
  const onDragEnd   = () => { setDraggingId(null); setDragOverCol(null); };
  const onDragOver  = (e, colId) => { e.preventDefault(); setDragOverCol(colId); };
  const onDragLeave = () => setDragOverCol(null);
  const onDrop      = (e, colId) => {
    e.preventDefault();
    const tid = e.dataTransfer.getData('text/plain') || draggingId;
    if (tid) {
      const t = tasks.find(t=>String(t.id)===String(tid));
      if (t && t.status !== colId) {
        const updated = { ...t, status: colId };
        if (colId==='done') updated.progress = 100;
        if (colId==='doing' && !t.startDate) updated.startDate = new Date().toISOString().split('T')[0];
        syncTask(updated);
      }
    }
    setDraggingId(null);
    setDragOverCol(null);
  };

  // ── COMENTÁRIOS ──
  const openComs     = tid  => { setComTaskId(String(tid)); setNovoComment(''); setModal('coms'); };
  const addComment   = e   => {
    e.preventDefault();
    if (!novoComment.trim()) return;
    const com = { id:Date.now().toString(), texto:novoComment.trim(), autor:nomeUsuario.trim()||'Anônimo', data:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) };
    setComentarios(curr=>{ const up={...curr,[comTaskId]:[...(curr[comTaskId]||[]),com]}; save('comentarios',up); return up; });
    setNovoComment('');
  };

  // ── CLIENTES ──
  const handleAddCliente = e => {
    e.preventDefault();
    if (!novoCliente.name.trim()) return;
    const p   = paleta(novoCliente.paletaId);
    const nc  = { id:'c_'+Date.now(), name:novoCliente.name.trim(), paletaId:novoCliente.paletaId, ...p };
    const upd = [...clientes,nc]; setClientes(upd); save('clientes',upd);
    setActiveAdTab(nc.id); setModal(null); setNovoCliente({...NOVO_CLI_VAZIO});
  };

  // ── NOVA DEMANDA ──
  const handleCriarDemanda = e => {
    e.preventDefault();
    const cId = novaDemanda.clientId||(clientes[0]?.id||'');
    syncTask({...novaDemanda,id:Date.now().toString(),clientId:cId,progress:Number(novaDemanda.progress)||0});
    setModal(null); setNovaDemanda({...NOVA_DEM_VAZIA});
  };

  // ── EDITAR ──
  const openEdit  = task => { setEditingTask({...task}); setModal('editTask'); };
  const saveEdit  = e    => { e.preventDefault(); syncTask(editingTask); setModal(null); };
  const finalize  = id   => {
    const t=tasks.find(t=>String(t.id)===String(id))||editingTask;
    if(t) syncTask({...t,status:'done',progress:100});
    if(modal==='editTask') setModal(null);
  };

  // ── ADD CRIATIVO ──
  const handleAddCriativo = e => {
    e.preventDefault();
    syncList(setCriativos,'criativos',{...newCreative,id:Date.now().toString(),clientId:newCreative.clientId||(clientes[0]?.id||''),status:'pendente'});
    setModal(null); setNewCreative({title:'CRIATIVO NOVO: ',content:'',clientId:'',link:''});
  };

  // ── ADD ANÚNCIO ──
  const handleAddAnuncio = e => {
    e.preventDefault();
    syncList(setAnuncios,'anuncios',{...newAd,id:Date.now().toString(),clientId:newAd.clientId||(clientes[0]?.id||'')});
    setModal(null); setNewAd({title:'',copy:'',clientId:'',platform:'Meta',imageUrl:''});
  };

  const closeModal = () => setModal(null);

  // ═══════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════
  return (
    <div className="min-h-screen bg-[#070b14] font-sans text-gray-200 selection:bg-fuchsia-500/30 pb-24 overflow-x-hidden">

      {/* BG */}
      <div className="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
        <div className="absolute top-[-15%] left-[-10%] w-[45%] h-[45%] rounded-full bg-purple-900/15 blur-[130px]"/>
        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/15 blur-[120px]"/>
      </div>

      <main className="max-w-screen-2xl mx-auto p-5 lg:p-8 space-y-10">

        {/* ══ HEADER ══ */}
        <header className="flex flex-col md:flex-row md:items-center justify-between gap-5 border-b border-white/5 pb-7">
          <div>
            <div className="flex items-center gap-2 mb-1.5">
              <i className="fa-solid fa-wand-magic-sparkles text-fuchsia-400 text-sm"/>
              <span className="text-xs font-bold tracking-widest text-fuchsia-400 uppercase">Tráfego Studio</span>
            </div>
            <h1 className="text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500 tracking-tight">
              Central de Produção
            </h1>
            <p className="text-gray-500 mt-2 flex items-center gap-2 text-sm">
              <span className="relative flex h-2 w-2">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-emerald-400"/>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"/>
              </span>
              Salvo localmente · Arraste os cards para mover entre colunas
            </p>
          </div>

          <div className="flex items-center gap-2.5 flex-wrap">
            {COLUNAS.map(col=>{
              const count = tasks.filter(t=>t.status===col.id).length;
              return (
                <div key={col.id} className={`${col.headerBg} border ${col.border} rounded-xl px-4 py-2 text-center min-w-[56px]`}>
                  <div className={`text-xl font-black ${col.color}`}>{String(count).padStart(2,'0')}</div>
                  <div className="text-[9px] text-gray-500 uppercase tracking-wider mt-0.5">{col.label}</div>
                </div>
              );
            })}
            <button onClick={()=>{ setNovaDemanda({...NOVA_DEM_VAZIA,clientId:clientes[0]?.id||''}); setModal('novadem'); }}
              className="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white border border-purple-500/50 px-5 py-2.5 rounded-xl text-sm font-bold transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-purple-500/20 ml-2">
              <i className="fa-solid fa-plus"/> Nova Demanda
            </button>
            <button onClick={()=>setModal('cliente')}
              className="flex items-center gap-2 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 px-4 py-2.5 rounded-xl text-sm font-bold transition-all hover:-translate-y-0.5">
              <i className="fa-solid fa-user-plus"/> Cliente
            </button>
          </div>
        </header>

        {/* ══ KANBAN BOARD ══ */}
        <section>
          <div className="flex items-center gap-3 mb-5">
            <div className="p-2.5 bg-orange-500/20 text-orange-400 rounded-lg flex items-center justify-center">
              <i className="fa-solid fa-table-columns text-sm"/>
            </div>
            <div>
              <h2 className="text-xl font-bold text-white">Esteira de Demandas</h2>
              <p className="text-xs text-gray-500 mt-0.5">Arraste os cards entre colunas para atualizar o status</p>
            </div>
          </div>

          <div className="kanban-wrap">
            {COLUNAS.map(col => {
              const colTasks = tasks.filter(t=>t.status===col.id);
              const isOver   = dragOverCol===col.id;
              return (
                <div key={col.id} className="kanban-col"
                  onDragOver={e=>onDragOver(e,col.id)}
                  onDragLeave={onDragLeave}
                  onDrop={e=>onDrop(e,col.id)}>

                  {/* Col Header */}
                  <div className={`flex items-center justify-between mb-3 px-1`}>
                    <div className="flex items-center gap-2">
                      <i className={`fa-solid ${col.icon} ${col.color} text-xs`}/>
                      <span className={`text-sm font-bold ${col.color}`}>{col.label}</span>
                      <span className={`text-[10px] font-black px-1.5 py-0.5 rounded-full ${col.bg} ${col.color} border ${col.border}`}>
                        {colTasks.length}
                      </span>
                    </div>
                    {col.id==='inbox'&&(
                      <button onClick={()=>{ setNovaDemanda({...NOVA_DEM_VAZIA,clientId:clientes[0]?.id||'',status:'inbox'}); setModal('novadem'); }}
                        className="text-gray-600 hover:text-gray-400 transition-colors text-xs">
                        <i className="fa-solid fa-plus"/>
                      </button>
                    )}
                  </div>

                  {/* Col Body */}
                  <div className={`kanban-col-body border ${col.border} ${col.bg} ${isOver?'drag-over':''}`}>

                    {/* Drop zone visual quando vazio */}
                    {colTasks.length===0&&(
                      <div className={`h-full min-h-[120px] flex flex-col items-center justify-center border-2 border-dashed ${isOver?`${col.border} opacity-70`:'border-white/5 opacity-40'} rounded-xl transition-all`}>
                        <i className={`fa-solid ${col.icon} ${col.color} text-xl mb-2 opacity-50`}/>
                        <p className="text-xs text-gray-600">Solte aqui</p>
                      </div>
                    )}

                    {/* Cards */}
                    {colTasks.map(task=>{
                      const cl = cById(task.clientId);
                      const nComs = getComs(task.id).length;
                      const isDragging = draggingId===task.id;
                      const pc = prioColor(task.prioridade);
                      return (
                        <div key={task.id}
                          draggable={true}
                          onDragStart={e=>onDragStart(e,task.id)}
                          onDragEnd={onDragEnd}
                          className={`task-card group relative bg-[#111827] border border-white/8 rounded-2xl mb-2.5 overflow-hidden hover:border-white/20 hover:shadow-lg hover:shadow-black/40 ${isDragging?'dragging':''}`}>

                          {/* Gradient left bar */}
                          <div className={`absolute top-0 left-0 w-0.5 h-full bg-gradient-to-b ${cl.theme}`}/>

                          <div className="p-4 pl-5">
                            {/* Top row */}
                            <div className="flex items-start justify-between gap-2 mb-2.5">
                              <span className={`px-2 py-0.5 text-[9px] font-black uppercase tracking-wider rounded-md ${cl.bg} ${cl.text} border ${cl.border} flex-shrink-0`}>{cl.name}</span>
                              <div className="flex items-center gap-1.5 flex-shrink-0">
                                {pc&&<span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded border ${pc}`}>{task.prioridade==='Urgente'?'🔴':'🟠'} {task.prioridade}</span>}
                                <i className="fa-solid fa-grip-vertical text-gray-700 group-hover:text-gray-500 text-xs transition-colors cursor-grab"/>
                              </div>
                            </div>

                            {/* Title */}
                            <h4 className="text-sm font-bold text-white leading-snug mb-2 pr-1">{task.title}</h4>

                            {/* Meta */}
                            <div className="flex flex-wrap gap-2 mb-3">
                              {task.solicitante&&(
                                <span className="flex items-center gap-1 text-[10px] text-gray-500 bg-white/4 px-2 py-0.5 rounded-md">
                                  <i className="fa-regular fa-user text-[9px]"/>{task.solicitante}
                                </span>
                              )}
                              {task.platform&&(
                                <span className="flex items-center gap-1 text-[10px] text-gray-500 bg-white/4 px-2 py-0.5 rounded-md">
                                  <i className="fa-solid fa-share-nodes text-[9px]"/>{task.platform}
                                </span>
                              )}
                              {task.deadline&&(
                                <span className={`flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-md ${task.prioridade==='Urgente'?'text-red-400 bg-red-500/10':'text-gray-500 bg-white/4'}`}>
                                  <i className="fa-regular fa-clock text-[9px]"/>{task.deadline}
                                </span>
                              )}
                            </div>

                            {/* Progress bar (só se tiver) */}
                            {task.progress!=null&&task.progress>0&&(
                              <div className="mb-3">
                                <div className="w-full bg-black/40 rounded-full h-1.5 overflow-hidden">
                                  <div className={`h-1.5 rounded-full bg-gradient-to-r ${cl.theme}`} style={{width:`${task.progress}%`}}/>
                                </div>
                                <span className={`text-[9px] ${cl.text} mt-0.5 block text-right`}>{task.progress}%</span>
                              </div>
                            )}

                            {/* Notes preview */}
                            {task.notes&&(
                              <p className="text-[10px] text-gray-600 bg-white/3 rounded-lg px-2.5 py-1.5 mb-3 line-clamp-2 leading-relaxed italic">"{task.notes}"</p>
                            )}

                            {/* Actions */}
                            <div className="flex gap-1.5 pt-1">
                              <button onClick={()=>openComs(task.id)}
                                className="relative flex items-center gap-1 text-[10px] text-gray-500 hover:text-purple-400 bg-white/4 hover:bg-purple-500/10 border border-transparent hover:border-purple-500/20 px-2.5 py-1.5 rounded-lg transition-all">
                                <i className="fa-solid fa-comments"/>
                                <span>Notas</span>
                                {nComs>0&&<span className="absolute -top-1.5 -right-1.5 bg-purple-500 text-white text-[9px] font-black w-3.5 h-3.5 rounded-full flex items-center justify-center">{nComs}</span>}
                              </button>
                              <button onClick={()=>openEdit(task)}
                                className="flex items-center gap-1 text-[10px] text-gray-500 hover:text-blue-400 bg-white/4 hover:bg-blue-500/10 border border-transparent hover:border-blue-500/20 px-2.5 py-1.5 rounded-lg transition-all">
                                <i className="fa-solid fa-pen-to-square"/><span>Editar</span>
                              </button>
                              {task.status!=='done'&&(
                                <button onClick={()=>finalize(task.id)}
                                  className="ml-auto flex items-center gap-1 text-[10px] text-gray-500 hover:text-emerald-400 bg-white/4 hover:bg-emerald-500/10 border border-transparent hover:border-emerald-500/20 px-2.5 py-1.5 rounded-lg transition-all">
                                  <i className="fa-solid fa-check"/> Ok
                                </button>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </section>

        {/* ══ LINHA: CRIATIVOS + ANÚNCIOS ══ */}
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-8 pt-2 border-t border-white/5">

          {/* Fábrica de Criativos */}
          <div className="lg:col-span-2 space-y-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-fuchsia-500/20 text-fuchsia-400 rounded-lg flex items-center justify-center"><i className="fa-solid fa-palette text-sm"/></div>
                <h2 className="text-lg font-bold text-white">Fábrica de Criativos</h2>
              </div>
              <button onClick={()=>{ setNewCreative({title:'CRIATIVO NOVO: ',content:'',clientId:clientes[0]?.id||'',link:''}); setModal('criativo'); }}
                className="bg-fuchsia-600 hover:bg-fuchsia-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
                <i className="fa-solid fa-plus"/> Solicitar
              </button>
            </div>

            <div className="bg-fuchsia-900/10 border border-fuchsia-500/20 rounded-2xl p-3 space-y-3">
              {criativos.map(cr=>{
                const cl = cById(cr.clientId);
                return (
                  <div key={cr.id} className="bg-gray-900/80 border border-white/5 p-4 rounded-xl">
                    <div className="flex justify-between items-start mb-2">
                      <span className={`px-2 py-0.5 text-[9px] font-bold uppercase rounded ${cl.bg} ${cl.text} border ${cl.border}`}>{cl.name}</span>
                    </div>
                    <h4 className="font-bold text-white text-sm mb-1">{cr.title}</h4>
                    <p className="text-xs text-gray-400 mb-3 line-clamp-2">{cr.content}</p>
                    {cr.link&&<a href={cr.link} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 text-[10px] text-blue-400 hover:text-blue-300 bg-blue-500/10 px-2 py-1 rounded-md mb-3 border border-blue-500/20"><i className="fa-solid fa-link"/> Referência</a>}
                    <button onClick={()=>delItem(setCriativos,'criativos',cr.id)}
                      className="w-full py-1.5 rounded-lg border border-white/10 text-xs text-gray-400 hover:bg-green-500/20 hover:text-green-400 hover:border-green-500/30 transition-all flex items-center justify-center gap-2">
                      <i className="fa-solid fa-check"/> Entregue
                    </button>
                  </div>
                );
              })}
              {criativos.length===0&&<p className="text-center text-gray-500 text-sm py-6">Nenhum criativo na fila.</p>}
            </div>
          </div>

          {/* Campanhas no Ar */}
          <div className="lg:col-span-3 space-y-4">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-green-500/20 text-green-400 rounded-lg flex items-center justify-center"><i className="fa-solid fa-bolt text-sm"/></div>
                <div>
                  <h2 className="text-lg font-bold text-white">Campanhas no Ar</h2>
                  <p className="text-xs text-gray-500">Anúncios ativos na vitrine</p>
                </div>
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                <div className="flex bg-black/40 p-1 rounded-xl border border-white/10 flex-wrap gap-1">
                  {clientes.map(cl=>(
                    <button key={cl.id} onClick={()=>setActiveAdTab(cl.id)}
                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeAdTab===cl.id?`${cl.bg} ${cl.text}`:'text-gray-500 hover:text-gray-300'}`}>
                      {cl.name}
                    </button>
                  ))}
                </div>
                <button onClick={()=>{ setNewAd({title:'',copy:'',clientId:activeAdTab,platform:'Meta',imageUrl:''}); setModal('anuncio'); }}
                  className="bg-green-600/20 hover:bg-green-500/30 text-green-400 border border-green-500/30 px-3 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5">
                  <i className="fa-solid fa-plus"/> Anúncio
                </button>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              {anuncios.filter(ad=>ad.clientId===activeAdTab).map(ad=>{
                const cl = cById(ad.clientId);
                return (
                  <div key={ad.id} className="group flex flex-col bg-gray-900/40 border border-white/10 rounded-2xl overflow-hidden hover:border-white/25 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-black/50">
                    <div className="h-36 relative bg-black/50 overflow-hidden flex items-center justify-center">
                      {ad.imageUrl?(<>
                        <div className="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-transparent z-10"/>
                        <img src={ad.imageUrl} alt={ad.title} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"/>
                      </>):(
                        <div className="text-center z-10"><i className="fa-regular fa-image text-3xl text-gray-600"/></div>
                      )}
                      <div className="absolute top-3 left-3 z-20">
                        <span className="bg-green-500/20 text-green-400 border border-green-500/30 text-[9px] uppercase font-black px-2.5 py-1 rounded-full flex items-center backdrop-blur-md">
                          <span className="w-1 h-1 bg-green-400 rounded-full mr-1.5 animate-pulse"/> Rodando
                        </span>
                      </div>
                    </div>
                    <div className="p-4 flex-1 bg-gray-900/60 backdrop-blur-xl">
                      <h4 className="text-sm font-bold text-white mb-2 line-clamp-1">{ad.title}</h4>
                      <p className="text-xs text-gray-500 leading-relaxed italic line-clamp-3">"{ad.copy}"</p>
                      <div className="mt-3 pt-3 border-t border-white/5 flex items-center gap-2">
                        <span className="text-[10px] font-semibold text-gray-600 uppercase tracking-wider">{ad.platform}</span>
                        <span className={`text-[10px] px-2 py-0.5 rounded-full ${cl.bg} ${cl.text} border ${cl.border} ml-auto`}>{cl.name}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
              {anuncios.filter(ad=>ad.clientId===activeAdTab).length===0&&(
                <div className="col-span-full py-12 text-center border border-white/5 border-dashed rounded-2xl bg-white/[0.01]">
                  <p className="text-gray-600">Nenhum anúncio cadastrado para este cliente.</p>
                </div>
              )}
            </div>
          </div>
        </div>

      </main>

      {/* ═══════════════════════════════════════════════════════
          MODAIS
      ═══════════════════════════════════════════════════════ */}

      {/* MODAL: ADICIONAR CLIENTE */}
      {modal==='cliente'&&(
        <MW onClose={closeModal} border="border-white/20" title="Adicionar Cliente" icon="fa-solid fa-user-plus" ic="text-white">
          <form onSubmit={handleAddCliente} className="space-y-5">
            <div>
              <label className="lbl">Nome do Cliente *</label>
              <input required type="text" placeholder="Ex: Empresa XYZ" className="inp focus:border-white/30"
                value={novoCliente.name} onChange={e=>setNovoCliente({...novoCliente,name:e.target.value})}/>
            </div>
            <div>
              <label className="lbl">Cor do Cliente</label>
              <div className="grid grid-cols-4 gap-2.5">
                {PALETA.map(p=>(
                  <button key={p.id} type="button" onClick={()=>setNovoCliente({...novoCliente,paletaId:p.id})}
                    className={`flex flex-col items-center gap-1.5 p-3 rounded-2xl border transition-all ${novoCliente.paletaId===p.id?'border-white/40 bg-white/10':'border-white/5 hover:bg-white/5'}`}>
                    <div className="w-7 h-7 rounded-full shadow-lg" style={{background:p.dot}}/>
                    <span className="text-[9px] text-gray-400 font-semibold">{p.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="flex gap-3 pt-1">
              <button type="button" onClick={closeModal} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
              <button type="submit" className="flex-1 bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                <i className="fa-solid fa-plus"/> Adicionar
              </button>
            </div>
          </form>
        </MW>
      )}

      {/* MODAL: NOVA DEMANDA */}
      {modal==='novadem'&&(
        <MW onClose={closeModal} border="border-purple-500/30" title="Nova Demanda" icon="fa-solid fa-plus" ic="text-purple-400">
          <form onSubmit={handleCriarDemanda} className="space-y-4">
            <div><label className="lbl">Título *</label><input required type="text" placeholder="Ex: Campanha Dia dos Namorados" className="inp focus:border-purple-500/50" value={novaDemanda.title} onChange={e=>setNovaDemanda({...novaDemanda,title:e.target.value})}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Cliente *</label>
                <select className="inp focus:border-purple-500/50" value={novaDemanda.clientId} onChange={e=>setNovaDemanda({...novaDemanda,clientId:e.target.value})}>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div><label className="lbl">Solicitante</label><input type="text" placeholder="Ex: Juan" className="inp focus:border-purple-500/50" value={novaDemanda.solicitante} onChange={e=>setNovaDemanda({...novaDemanda,solicitante:e.target.value})}/></div>
            </div>
            <div><label className="lbl">Responsável</label><input type="text" placeholder="Ex: Ana Silva" className="inp focus:border-purple-500/50" value={novaDemanda.responsavel} onChange={e=>setNovaDemanda({...novaDemanda,responsavel:e.target.value})}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Status Inicial</label>
                <select className="inp focus:border-purple-500/50" value={novaDemanda.status} onChange={e=>setNovaDemanda({...novaDemanda,status:e.target.value})}>
                  {COLUNAS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                </select>
              </div>
              <div><label className="lbl">Prioridade</label>
                <select className="inp focus:border-purple-500/50" value={novaDemanda.prioridade} onChange={e=>setNovaDemanda({...novaDemanda,prioridade:e.target.value})}>
                  <option value="Normal">Normal</option><option value="Alta">Alta</option><option value="Urgente">Urgente 🔴</option>
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Plataforma</label>
                <select className="inp focus:border-purple-500/50" value={novaDemanda.platform} onChange={e=>setNovaDemanda({...novaDemanda,platform:e.target.value})}>
                  {['Meta Ads','Google Ads','TikTok Ads','YouTube','LinkedIn','Site/LP','Data Studio','Outros'].map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div><label className="lbl">Prazo *</label><input required type="text" placeholder="15/05 ou Urgente" className="inp focus:border-purple-500/50" value={novaDemanda.deadline} onChange={e=>setNovaDemanda({...novaDemanda,deadline:e.target.value})}/></div>
            </div>
            <div><label className="lbl">Data de Início</label><input type="date" className="inp focus:border-purple-500/50" value={novaDemanda.startDate} onChange={e=>setNovaDemanda({...novaDemanda,startDate:e.target.value})}/></div>
            <div><label className="lbl">Progresso: <span className="text-purple-400">{novaDemanda.progress}%</span></label><input type="range" min="0" max="100" className="w-full" value={novaDemanda.progress} onChange={e=>setNovaDemanda({...novaDemanda,progress:e.target.value})}/></div>
            <div><label className="lbl">Observações</label><textarea rows="2" placeholder="Notas, links..." className="inp focus:border-purple-500/50" value={novaDemanda.notes} onChange={e=>setNovaDemanda({...novaDemanda,notes:e.target.value})}/></div>
            <div className="flex gap-3 pt-2">
              <button type="button" onClick={closeModal} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
              <button type="submit" className="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl transition-colors"><i className="fa-solid fa-plus mr-2"/>Criar</button>
            </div>
          </form>
        </MW>
      )}

      {/* MODAL: EDITAR TAREFA */}
      {modal==='editTask'&&editingTask&&(
        <MW onClose={closeModal} border="border-blue-500/30" title="Editar Demanda" icon="fa-solid fa-pen-to-square" ic="text-blue-400">
          <form onSubmit={saveEdit} className="space-y-4">
            <div><label className="lbl">Título</label><input required type="text" className="inp focus:border-blue-500/50" value={editingTask.title} onChange={e=>setEditingTask({...editingTask,title:e.target.value})}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Cliente</label>
                <select className="inp focus:border-blue-500/50" value={editingTask.clientId||clientes[0]?.id} onChange={e=>setEditingTask({...editingTask,clientId:e.target.value})}>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div><label className="lbl">Solicitante</label><input type="text" className="inp focus:border-blue-500/50" value={editingTask.solicitante||''} onChange={e=>setEditingTask({...editingTask,solicitante:e.target.value})}/></div>
            </div>
            <div><label className="lbl">Responsável</label><input type="text" className="inp focus:border-blue-500/50" value={editingTask.responsavel||''} onChange={e=>setEditingTask({...editingTask,responsavel:e.target.value})}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Status</label>
                <select className="inp focus:border-blue-500/50" value={editingTask.status} onChange={e=>setEditingTask({...editingTask,status:e.target.value})}>
                  {COLUNAS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                </select>
              </div>
              <div><label className="lbl">Prioridade</label>
                <select className="inp focus:border-blue-500/50" value={editingTask.prioridade||'Normal'} onChange={e=>setEditingTask({...editingTask,prioridade:e.target.value})}>
                  <option value="Normal">Normal</option><option value="Alta">Alta</option><option value="Urgente">Urgente 🔴</option>
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Plataforma</label>
                <select className="inp focus:border-blue-500/50" value={editingTask.platform||'Meta Ads'} onChange={e=>setEditingTask({...editingTask,platform:e.target.value})}>
                  {['Meta Ads','Google Ads','TikTok Ads','YouTube','LinkedIn','Site/LP','Data Studio','Outros'].map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div><label className="lbl">Prazo</label><input type="text" className="inp focus:border-blue-500/50" value={editingTask.deadline||''} onChange={e=>setEditingTask({...editingTask,deadline:e.target.value})}/></div>
            </div>
            <div><label className="lbl">Data de Início</label><input type="date" className="inp focus:border-blue-500/50" value={editingTask.startDate||''} onChange={e=>setEditingTask({...editingTask,startDate:e.target.value})}/></div>
            <div><label className="lbl">Progresso: <span className="text-blue-400">{editingTask.progress||0}%</span></label><input type="range" min="0" max="100" className="w-full" value={editingTask.progress||0} onChange={e=>setEditingTask({...editingTask,progress:parseInt(e.target.value)})}/></div>
            <div><label className="lbl">Observações</label><textarea rows="3" className="inp focus:border-blue-500/50" value={editingTask.notes||''} onChange={e=>setEditingTask({...editingTask,notes:e.target.value})}/></div>
            <div className="flex gap-3 pt-4 border-t border-white/10">
              <button type="button" onClick={()=>{ delItem(setTasks,'tasks',editingTask.id); setModal(null); }}
                className="bg-red-600/20 hover:bg-red-500/30 text-red-400 border border-red-500/30 px-4 py-3 rounded-xl transition-colors"><i className="fa-solid fa-trash"/></button>
              <button type="button" onClick={()=>finalize(editingTask.id)}
                className="flex-1 bg-emerald-600/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 font-bold py-3 rounded-xl transition-colors">
                <i className="fa-solid fa-check-double mr-2"/>Finalizar
              </button>
              <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors">
                <i className="fa-solid fa-floppy-disk mr-2"/>Salvar
              </button>
            </div>
          </form>
        </MW>
      )}

      {/* MODAL: SOLICITAR CRIATIVO */}
      {modal==='criativo'&&(
        <MW onClose={closeModal} border="border-fuchsia-500/30" title="Solicitar Criativo" icon="fa-solid fa-palette" ic="text-fuchsia-400">
          <form onSubmit={handleAddCriativo} className="space-y-4">
            <div><label className="lbl">Título</label><input required type="text" className="inp focus:border-fuchsia-500/50" value={newCreative.title} onChange={e=>setNewCreative({...newCreative,title:e.target.value})}/></div>
            <div><label className="lbl">Cliente</label>
              <select className="inp focus:border-fuchsia-500/50" value={newCreative.clientId} onChange={e=>setNewCreative({...newCreative,clientId:e.target.value})}>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div><label className="lbl">Briefing</label><textarea required rows="3" placeholder="Formato, estilo, referências..." className="inp focus:border-fuchsia-500/50" value={newCreative.content} onChange={e=>setNewCreative({...newCreative,content:e.target.value})}/></div>
            <div><label className="lbl">Link de Referência (Opcional)</label><input type="url" placeholder="https://..." className="inp focus:border-fuchsia-500/50" value={newCreative.link} onChange={e=>setNewCreative({...newCreative,link:e.target.value})}/></div>
            <div className="flex gap-3 pt-2">
              <button type="button" onClick={closeModal} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
              <button type="submit" className="flex-1 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-3 rounded-xl transition-colors">Solicitar</button>
            </div>
          </form>
        </MW>
      )}

      {/* MODAL: CADASTRAR ANÚNCIO */}
      {modal==='anuncio'&&(
        <MW onClose={closeModal} border="border-green-500/30" title="Cadastrar Anúncio Ativo" icon="fa-solid fa-bolt" ic="text-green-400">
          <form onSubmit={handleAddAnuncio} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div><label className="lbl">Cliente</label>
                <select className="inp focus:border-green-500/50" value={newAd.clientId} onChange={e=>setNewAd({...newAd,clientId:e.target.value})}>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div><label className="lbl">Plataforma</label>
                <select className="inp focus:border-green-500/50" value={newAd.platform} onChange={e=>setNewAd({...newAd,platform:e.target.value})}>
                  <option value="Meta">Meta Ads</option><option value="Google">Google Ads</option><option value="TikTok">TikTok Ads</option>
                </select>
              </div>
            </div>
            <div><label className="lbl">Nome do Anúncio</label><input required type="text" placeholder="Ex: Carrossel Dia das Mães" className="inp focus:border-green-500/50" value={newAd.title} onChange={e=>setNewAd({...newAd,title:e.target.value})}/></div>
            <div><label className="lbl">Copy (Texto)</label><textarea required rows="3" className="inp focus:border-green-500/50" value={newAd.copy} onChange={e=>setNewAd({...newAd,copy:e.target.value})}/></div>
            <div><label className="lbl">Link da Imagem (Opcional)</label><input type="url" placeholder="https://..." className="inp focus:border-green-500/50" value={newAd.imageUrl} onChange={e=>setNewAd({...newAd,imageUrl:e.target.value})}/></div>
            <div className="flex gap-3 pt-2">
              <button type="button" onClick={closeModal} className="flex-1 bg-white/5 hover:bg-white/10 text-gray-300 border border-white/10 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
              <button type="submit" className="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-colors">Publicar</button>
            </div>
          </form>
        </MW>
      )}

      {/* MODAL: COMENTÁRIOS */}
      {modal==='coms'&&comTaskId&&(()=>{
        const t   = tasks.find(x=>String(x.id)===comTaskId);
        const cl  = t ? cById(t.clientId) : clientes[0];
        const cms = getComs(comTaskId);
        return (
          <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={closeModal}>
            <div className="bg-[#0d1220] border border-purple-500/30 rounded-t-3xl md:rounded-3xl w-full max-w-lg shadow-2xl flex flex-col max-h-[85vh] slide-up" onClick={e=>e.stopPropagation()}>

              <div className="flex items-center justify-between p-5 border-b border-white/5">
                <div className="flex items-center gap-3">
                  {t&&<span className={`px-2 py-0.5 text-[9px] font-bold uppercase rounded ${cl.bg} ${cl.text} border ${cl.border}`}>{cl.name}</span>}
                  <div>
                    <h2 className="text-base font-bold text-white flex items-center gap-2"><i className="fa-solid fa-comments text-purple-400"/> Comentários</h2>
                    {t&&<p className="text-xs text-gray-500 mt-0.5 line-clamp-1">{t.title}</p>}
                  </div>
                </div>
                <button onClick={closeModal} className="text-gray-500 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-lg"/></button>
              </div>

              <div className="px-5 pt-3 pb-2 border-b border-white/5">
                <label className="lbl">Você é:</label>
                <input type="text" placeholder="Seu nome (ex: Juan, Ana...)" className="inp focus:border-purple-500/40 py-2"
                  value={nomeUsuario} onChange={e=>{ setNomeUsuario(e.target.value); save('nomeUsuario',e.target.value); }}/>
              </div>

              <div className="flex-1 overflow-y-auto p-5 space-y-4">
                {cms.length===0&&(
                  <div className="text-center py-10">
                    <i className="fa-regular fa-comment-dots text-4xl text-gray-700 mb-3 block"/>
                    <p className="text-gray-500 text-sm">Nenhum comentário ainda.</p>
                  </div>
                )}
                {cms.map(c=>(
                  <div key={c.id} className="flex gap-3">
                    <div className="w-8 h-8 rounded-full bg-purple-500/20 border border-purple-500/30 flex items-center justify-center flex-shrink-0 mt-0.5">
                      <span className="text-purple-400 text-xs font-black">{(c.autor||'?')[0].toUpperCase()}</span>
                    </div>
                    <div className="flex-1">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-xs font-bold text-purple-300">{c.autor}</span>
                        <span className="text-[10px] text-gray-600">{c.data}</span>
                      </div>
                      <div className="bg-white/5 border border-white/5 rounded-2xl rounded-tl-sm px-4 py-3">
                        <p className="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">{c.texto}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="p-4 border-t border-white/5">
                <form onSubmit={addComment} className="flex gap-3">
                  <textarea rows="1" placeholder="Escreva um comentário... (Enter para enviar)"
                    className="flex-1 bg-black/50 border border-white/10 rounded-2xl px-4 py-2.5 text-white text-sm outline-none focus:border-purple-500/50 placeholder-gray-600 resize-none"
                    value={novoComment} onChange={e=>setNovoComment(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey) addComment(e); }}/>
                  <button type="submit" className="bg-purple-600 hover:bg-purple-500 text-white px-4 rounded-2xl font-bold transition-colors flex items-center justify-center">
                    <i className="fa-solid fa-paper-plane"/>
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

// ── Modal Wrapper ──────────────────────────────────────────────
function MW({ onClose, border, title, icon, ic, children }) {
  return (
    <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className={`bg-[#0f1523] border ${border} rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl relative max-h-[92vh] overflow-y-auto fade-in`} onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 text-gray-500 hover:text-white transition-colors"><i className="fa-solid fa-xmark text-xl"/></button>
        <h2 className="text-xl font-bold text-white mb-5 flex items-center gap-3"><i className={`${icon} ${ic}`}/>{title}</h2>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
